<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Athlete Blueprint</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --card: #16161f;
  --card2: #1e1e2a;
  --border: rgba(255,255,255,0.06);
  --accent: #c8f135;
  --accent2: #a8d020;
  --accent-dim: rgba(200,241,53,0.12);
  --accent-dim2: rgba(200,241,53,0.06);
  --run: #38b2f0;
  --run-dim: rgba(56,178,240,0.12);
  --strength: #f07038;
  --strength-dim: rgba(240,112,56,0.12);
  --food: #f0c038;
  --food-dim: rgba(240,192,56,0.12);
  --recovery: #c038f0;
  --recovery-dim: rgba(192,56,240,0.12);
  --work: #38f0b2;
  --work-dim: rgba(56,240,178,0.12);
  --sleep: #9b8fff;
  --sleep-dim: rgba(155,143,255,0.12);
  --text: #f0f0f5;
  --text2: #9090a8;
  --text3: #5a5a72;
  --radius: 16px;
  --radius-sm: 10px;
  --tab-h: 68px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); }

/* SCROLLABLE AREAS */
.page { position: absolute; inset: 0; bottom: var(--tab-h); overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; display: none; flex-direction: column; }
.page.active { display: flex; }

/* HEADER */
.hdr { padding: 52px 20px 16px; position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--border); }
.hdr-top { display: flex; justify-content: space-between; align-items: flex-start; }
.hdr-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 4px; }
.hdr-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: .04em; color: var(--text); line-height: 1; }
.hdr-date { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
.streak-badge { background: var(--accent-dim); border: 1px solid rgba(200,241,53,0.2); border-radius: 20px; padding: 6px 12px; display: flex; align-items: center; gap: 5px; }
.streak-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); line-height: 1; }
.streak-lbl { font-size: 10px; color: var(--accent2); font-weight: 500; }

/* PROGRESS RING */
.prog-section { padding: 20px; display: flex; align-items: center; gap: 20px; }
.ring-wrap { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--bg3); stroke-width: 6; }
.ring-fg { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
.ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-pct { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--accent); line-height: 1; }
.ring-done { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }
.prog-info { flex: 1; }
.prog-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.prog-sub { font-size: 12px; color: var(--text2); line-height: 1.5; }
.prog-cats { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.cat-pill { font-size: 10px; font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 20px; }

/* SECTION HEADER */
.sec-hdr { padding: 20px 20px 8px; display: flex; justify-content: space-between; align-items: center; }
.sec-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: .05em; color: var(--text2); }
.sec-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }

/* TIMELINE ITEMS */
.tl-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 8px; }
.tl-item { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: opacity .2s; }
.tl-item.done-item { opacity: .55; }
.tl-item.done-item .tl-title { text-decoration: line-through; color: var(--text3); }
.tl-main { display: flex; align-items: center; padding: 14px; gap: 12px; min-height: 64px; }
.tl-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; cursor: pointer; user-select: none; }
.tl-check.checked { border-color: var(--accent); background: var(--accent); }
.tl-check svg { opacity: 0; transition: opacity .2s; }
.tl-check.checked svg { opacity: 1; }
.tl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tl-content { flex: 1; min-width: 0; }
.tl-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); margin-bottom: 2px; }
.tl-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.tl-sub { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
.tl-expand { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; color: var(--text3); transition: transform .2s, color .2s; }
.tl-expand.open { transform: rotate(180deg); color: var(--accent); }
.tl-sci { padding: 0 14px 14px 52px; display: none; }
.tl-sci.open { display: block; }
.sci-box { background: rgba(200,241,53,0.06); border-left: 2px solid var(--accent); border-radius: 0 8px 8px 0; padding: 10px 12px; }
.sci-lbl { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--accent2); letter-spacing: .08em; margin-bottom: 4px; }
.sci-txt { font-size: 12px; color: var(--text2); line-height: 1.6; }

/* TABS */
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--tab-h); background: var(--bg2); border-top: 1px solid var(--border); display: flex; align-items: stretch; z-index: 100; }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; user-select: none; transition: color .2s; color: var(--text3); padding-bottom: 8px; }
.tab-btn.active { color: var(--accent); }
.tab-btn svg { width: 22px; height: 22px; }
.tab-lbl { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: .04em; }
.tab-indicator { position: absolute; bottom: 0; height: 2px; background: var(--accent); border-radius: 2px 2px 0 0; transition: left .25s cubic-bezier(.4,0,.2,1); }

/* WEEKLY PAGE */
.week-grid { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
.day-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
.day-hdr { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.day-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .04em; }
.day-today { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .04em; color: var(--accent); }
.day-badges { display: flex; gap: 6px; align-items: center; }
.day-badge { font-size: 10px; font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 20px; }
.day-prog { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); }
.day-body { padding: 0 16px 14px; display: none; flex-direction: column; gap: 6px; }
.day-body.open { display: flex; }
.we-task { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--bg3); border-radius: var(--radius-sm); cursor: pointer; user-select: none; }
.we-task-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
.we-task-check.checked { background: var(--accent); border-color: var(--accent); }
.we-task-txt { font-size: 12px; color: var(--text2); flex: 1; }
.we-task-txt.checked { text-decoration: line-through; color: var(--text3); }
.we-task-sets { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); }

/* DIET PAGE */
.diet-toggle { padding: 16px 20px 8px; display: flex; gap: 8px; }
.diet-btn { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--card); font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); text-align: center; cursor: pointer; transition: all .2s; user-select: none; }
.diet-btn.active { background: var(--accent-dim); border-color: rgba(200,241,53,0.3); color: var(--accent); }
.meal-list { padding: 8px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
.meal-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
.meal-top { padding: 14px; }
.meal-time-badge { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--food); background: var(--food-dim); padding: 3px 8px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
.meal-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.meal-desc { font-size: 12px; color: var(--text2); line-height: 1.6; }
.meal-macros { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.macro-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); background: var(--bg3); padding: 3px 8px; border-radius: 20px; }
.meal-sci { padding: 0 14px 14px; border-top: 1px solid var(--border); margin-top: 0; }
.meal-sci-inner { margin-top: 10px; background: rgba(200,241,53,0.05); border-left: 2px solid var(--accent); border-radius: 0 8px 8px 0; padding: 8px 10px; font-size: 11px; color: var(--text2); line-height: 1.6; }

/* SCIENCE PAGE */
.sci-section { padding: 16px 20px; }
.sci-section-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .04em; color: var(--text2); margin-bottom: 12px; }
.sci-cards { display: flex; flex-direction: column; gap: 8px; }
.sci-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; }
.sci-card-title { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
.sci-card-body { font-size: 12px; color: var(--text2); line-height: 1.7; }

/* STATS/SETTINGS */
.stats-grid { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--text2); margin-top: 4px; }
.stat-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 2px; }
.action-row { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.action-btn { padding: 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; transition: background .15s; }
.action-btn:active { background: var(--card2); }
.action-btn-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.action-btn-txt { flex: 1; }
.action-btn-title { font-size: 14px; font-weight: 500; color: var(--text); }
.action-btn-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.action-btn-arr { color: var(--text3); }
.profile-card { margin: 0 20px 20px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
.profile-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--accent-dim); border: 2px solid rgba(200,241,53,0.25); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); flex-shrink: 0; }
.profile-info { flex: 1; }
.profile-name { font-size: 16px; font-weight: 600; color: var(--text); }
.profile-stats { font-size: 12px; color: var(--text2); margin-top: 2px; }
.profile-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.profile-tag { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 20px; }

/* TOAST */
.toast { position: fixed; bottom: calc(var(--tab-h) + 16px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #0a0a0f; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 40px; opacity: 0; transition: all .3s; z-index: 999; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* RESET CONFIRM */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: none; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal-sheet { background: var(--bg2); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .04em; margin-bottom: 8px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
.modal-btns { display: flex; gap: 10px; }
.modal-cancel { flex: 1; padding: 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); font-size: 14px; font-weight: 500; color: var(--text2); cursor: pointer; text-align: center; user-select: none; }
.modal-confirm { flex: 1; padding: 16px; border-radius: var(--radius); border: none; background: #e05; font-size: 14px; font-weight: 600; color: #fff; cursor: pointer; text-align: center; user-select: none; }

/* SCROLLBAR HIDE */
::-webkit-scrollbar { display: none; }

/* COLOR HELPERS */
.c-run { color: var(--run); } .bg-run { background: var(--run-dim); }
.c-strength { color: var(--strength); } .bg-strength { background: var(--strength-dim); }
.c-food { color: var(--food); } .bg-food { background: var(--food-dim); }
.c-recovery { color: var(--recovery); } .bg-recovery { background: var(--recovery-dim); }
.c-work { color: var(--work); } .bg-work { background: var(--work-dim); }
.c-sleep { color: var(--sleep); } .bg-sleep { background: var(--sleep-dim); }
.c-accent { color: var(--accent); } .bg-accent { background: var(--accent-dim); }

.pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
</style>
</head>
<body>

<!-- PAGES -->
<div class="page active" id="page-today"></div>
<div class="page" id="page-week"></div>
<div class="page" id="page-diet"></div>
<div class="page" id="page-science"></div>
<div class="page" id="page-stats"></div>

<!-- TAB BAR -->
<nav class="tab-bar" id="tabBar">
  <div class="tab-btn active" data-tab="today" onclick="switchTab('today',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
    <span class="tab-lbl">TODAY</span>
  </div>
  <div class="tab-btn" data-tab="week" onclick="switchTab('week',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="tab-lbl">WEEK</span>
  </div>
  <div class="tab-btn" data-tab="diet" onclick="switchTab('diet',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a9 9 0 1 0 9 9"/><path d="M12 6v6l3 3"/><path d="M18 2v4h4"/></svg>
    <span class="tab-lbl">DIET</span>
  </div>
  <div class="tab-btn" data-tab="science" onclick="switchTab('science',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/></svg>
    <span class="tab-lbl">SCIENCE</span>
  </div>
  <div class="tab-btn" data-tab="stats" onclick="switchTab('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="tab-lbl">PROFILE</span>
  </div>
</nav>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="resetModal">
  <div class="modal-sheet">
    <div class="modal-title">Reset Today?</div>
    <div class="modal-sub">All completed tasks for today will be unchecked. Your streak will reset if today had progress.</div>
    <div class="modal-btns">
      <div class="modal-cancel" onclick="closeModal()">Cancel</div>
      <div class="modal-confirm" onclick="confirmReset()">Reset</div>
    </div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const TIMELINE = [
  { id:'t1', time:'6:30 AM', cat:'sleep', title:'Wake up — no phone for 15 min', sub:'2 glasses of water. Step outside for natural light.', sci:'Cortisol peaks at wake. Sunlight anchors your circadian clock via ipRGC retinal cells. This single habit is the most powerful sleep-quality intervention known.' },
  { id:'t2', time:'6:40 AM', cat:'food', title:'Pre-run fuel (light)', sub:'1 banana or 2 dates + small glass of milk. No fat.', sci:'Simple carbs absorb in 15-20 min. Fat and fibre delay gastric emptying and cause cramps during running. Keep fat at zero pre-run.' },
  { id:'t3', time:'6:55 AM', cat:'run', title:'Dynamic warm-up — 5 min', sub:'Leg swings, high knees, butt kicks, ankle circles, hip rotations.', sci:'Dynamic warm-up raises muscle temperature by 1-2°C, increases neural firing rate, and reduces injury risk by ~54% vs cold static stretching.' },
  { id:'t4', time:'7:00 AM', cat:'run', title:'Morning Run', sub:'Mon/Fri: 20-25 min easy intervals. Wed: 25 min tempo. Sat: 30-35 min long slow run. Tue/Thu/Sun: Rest.', sci:'Zone 2 running improves mitochondrial biogenesis and fat oxidation. Morning cortisol peak improves alertness. Run at conversational pace — 5-6 words between breaths.' },
  { id:'t5', time:'7:35 AM', cat:'food', title:'Post-run recovery drink', sub:'Nimbu paani: water + lemon + rock salt + jeera + 1 tsp jaggery. Then shower.', sci:'GLUT-4 transporters are maximally active 30 min post-exercise. Carbohydrate restores glycogen 2-3x faster in this window. The anabolic window is real and measurable.' },
  { id:'t6', time:'8:00 AM', cat:'food', title:'Full breakfast', sub:'3 eggs + 1 glass milk + 2 rotis/upma + seasonal fruit + 1 tsp ghee. (Veg days: besan chilla or dalia)', sci:'Protein at breakfast (25-30g) activates muscle protein synthesis for 3-4 hrs via mTOR. Leucine content in eggs (~1.1g per egg) is the anabolic switch.' },
  { id:'t7', time:'8:30 AM', cat:'work', title:'Deep work block 1', sub:'Most demanding tasks: studying, writing, analysis. No social media until 11 AM.', sci:'Norepinephrine and dopamine elevated post-exercise for 2-4 hrs. Combined with cortisol, this creates the highest focus window of the day. This is a measurable neurochemical peak.' },
  { id:'t8', time:'11:00 AM', cat:'food', title:'Mid-morning snack', sub:'Sattu sherbet OR roasted peanuts + 1 apple OR makhana.', sci:'Sattu GI index ~28 vs white rice at 72. Prevents the pre-lunch glucose crash that degrades focus, mood, and reaction time.' },
  { id:'t9', time:'11:15 AM', cat:'work', title:'Deep work block 2', sub:'Administrative tasks, reading, creative work, emails. Moderate difficulty.', sci:'Attention sustains well until lunch if blood glucose is stable. Good window for structured tasks and communications.' },
  { id:'t10', time:'1:00 PM', cat:'food', title:'Lunch', sub:'Dal + rice or roti + sabzi + chicken/fish (or paneer/rajma on veg days) + curd + salad.', sci:'Dal + grain gives a complete amino acid profile. Curd probiotics reduce GI inflammation and improve protein absorption efficiency by up to 15%.' },
  { id:'t11', time:'1:45 PM', cat:'recovery', title:'Nap — 10 to 20 min ONLY', sub:'Set alarm. Do not exceed 25 min or you enter deep sleep.', sci:'NASA-studied naps of 10-20 min improve alertness by 54% and performance by 34%. Beyond 25 min you cross into N2 sleep causing sleep inertia.' },
  { id:'t12', time:'2:15 PM', cat:'work', title:'Work block 3', sub:'Routine tasks, meetings, calls, revision. Not ideal for deep creative work.', sci:'Post-lunch dip resolves after nap. Body temperature is rising toward afternoon peak. Good for structured tasks and meetings.' },
  { id:'t13', time:'4:30 PM', cat:'food', title:'Pre-workout fuel', sub:'2 rotis with peanut butter OR banana + chivda. 250 ml water.', sci:'Consumed 90 min before training: maximises muscle glycogen. Peanut butter arginine converts to nitric oxide, improving muscle vasodilation.' },
  { id:'t14', time:'6:00 PM', cat:'strength', title:'Strength / Calisthenics — 1 hour', sub:'Upper/lower/full body per weekly plan. See Week tab for daily breakdown.', sci:'Body temperature peaks 4-7 PM. Muscle power output is up to 8% higher than morning. Testosterone peaks in late afternoon. Your strongest physiological state.' },
  { id:'t15', time:'7:10 PM', cat:'food', title:'Post-workout protein window', sub:'1 glass milk immediately. Dinner within 60 min.', sci:'Muscle protein synthesis is highest 1-2 hrs post-strength session. Leucine-containing protein (milk, dal, paneer) triggers mTORC1 signalling for repair and growth.' },

// ─── STATE ───────────────────────────────────────────────────────────────────
function getState() {
  return JSON.parse(localStorage.getItem('ab_state') || '{}');
}
function saveState(s) {
  localStorage.setItem('ab_state', JSON.stringify(s));
}
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}
function getCompletedToday() {
  const s = getState();
  return s[getTodayKey()] || {};
}
function setTaskDone(id, done) {
  const s = getState();
  const k = getTodayKey();
  if (!s[k]) s[k] = {};
  s[k][id] = done;
  saveState(s);
}

// Weekly checklist
function getWeekKey() {
  const d = new Date();
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  return `week_${monday.getFullYear()}-${monday.getMonth()}-${monday.getDate()}`;
}
function getWeeklyDone() {
  const s = getState();
  return s[getWeekKey()] || {};
}
function setWeekTaskDone(day, idx, done) {
  const s = getState();
  const k = getWeekKey();
  if (!s[k]) s[k] = {};
  const key = `${day}_${idx}`;
  s[k][key] = done;
  saveState(s);
}

// Streak
function updateStreak() {
  const s = getState();
  const today = getTodayKey();
  const todayDone = s[today] || {};
  const totalToday = Object.values(todayDone).filter(Boolean).length;
  const totalTasks = TIMELINE.length;
  const pct = totalToday / totalTasks;
  
  if (!s.streakData) s.streakData = { current: 0, best: 0, lastActiveDay: null };
  
  if (pct >= 0.5 && s.streakData.lastActiveDay !== today) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yKey = `${yesterday.getFullYear()}-${yesterday.getMonth()}-${yesterday.getDate()}`;
    if (s.streakData.lastActiveDay === yKey || s.streakData.lastActiveDay === null) {
      s.streakData.current++;
    } else {
      s.streakData.current = 1;
    }
    s.streakData.lastActiveDay = today;
    if (s.streakData.current > s.streakData.best) s.streakData.best = s.streakData.current;
    saveState(s);
  }
  return s.streakData;
}

function toggleTask(id) {
  const done = getCompletedToday();
  const newDone = !done[id];
  setTaskDone(id, newDone);
  
  const item = document.getElementById(`item_${id}`);
  const check = item.querySelector('.tl-check');
  const title = item.querySelector('.tl-title');
  
  if (newDone) {
    item.classList.add('done-item');
    check.classList.add('checked');
    showToast('Task complete! 💪');
  } else {
    item.classList.remove('done-item');
    check.classList.remove('checked');
  }
  
  updateProgressRing();
  updateStreak();
}

function toggleSci(id) {
  const sci = document.getElementById(`sci_${id}`);
  const btn = sci.previousElementSibling.querySelector('.tl-expand');
  sci.classList.toggle('open');
  btn.classList.toggle('open');
}

            ${isDone?`<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5l3 3L10 1" stroke="#0a0a0f" stroke-width="2" stroke-linecap="round"/></svg>`:''}

          <div class="we-task-txt ${isDone?'checked':''}">${task.name}</div>
          <div class="we-task-sets">${task.sets}</div>
        </div>`;
    });
    
    html += `</div></div>`;
    
    if (isToday) {
      // Auto-open today
      setTimeout(() => {
        const body = document.getElementById(`body_${day}`);
        const arr = document.getElementById(`arr_${day}`);
        if (body) { body.classList.add('open'); arr.style.transform = 'rotate(180deg)'; }
      }, 50);
    }
  });

  html += `</div>`;
  page.innerHTML = html;
}

function toggleDay(day) {
  const body = document.getElementById(`body_${day}`);
  const arr = document.getElementById(`arr_${day}`);
  body.classList.toggle('open');
  arr.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
}

function toggleWeekTask(day, idx) {
  const weekDone = getWeeklyDone();
  const key = `${day}_${idx}`;
  const newVal = !weekDone[key];
  setWeekTaskDone(day, idx, newVal);
  
  const check = document.getElementById(`wc_${day}_${idx}`);
  const txt = check.nextElementSibling;
  
  if (newVal) {
    check.classList.add('checked');
    check.innerHTML = `<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5l3 3L10 1" stroke="#0a0a0f" stroke-width="2" stroke-linecap="round"/></svg>`;
    txt.classList.add('checked');
    showToast('Set complete! 🔥');
  } else {
    check.classList.remove('checked');
    check.innerHTML = '';
    txt.classList.remove('checked');
  }
  
  // Update count
  const plan = WEEK_PLAN[day];
  let allIdxs = [];
  if (plan.run) plan.run.forEach((_,i) => allIdxs.push(`run_${i}`));
  if (plan.strength) plan.strength.forEach((_,i) => allIdxs.push(`str_${i}`));
  if (plan.rest) plan.rest.forEach((_,i) => allIdxs.push(`rest_${i}`));
  const s = getState(); const k = getWeekKey(); const wd = s[k]||{};
  const dc = allIdxs.filter(i => wd[`${day}_${i}`]).length;
  const progEl = document.querySelector(`#body_${day}`).previousElementSibling.querySelector('.day-prog');
  if (progEl) progEl.textContent = `${dc}/${allIdxs.length}`;
}

// ─── TAB NAVIGATION ───────────────────────────────────────────────────────────
const TABS = ['today','week','diet','science','stats'];
let currentTab = 'today';

function switchTab(tab, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  btn.classList.add('active');
  currentTab = tab;
  
  if (tab === 'today') renderToday();
  if (tab === 'week') renderWeek();
  if (tab === 'diet') renderDiet();
  if (tab === 'science') renderScience();
  if (tab === 'stats') renderStats();
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal() { document.getElementById('resetModal').classList.add('open'); }
function closeModal() { document.getElementById('resetModal').classList.remove('open'); }
function confirmReset() {
  const s = getState();
  delete s[getTodayKey()];
  saveState(s);
  closeModal();
  showToast('Today reset!');
  renderToday();
  renderStats();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderToday();
